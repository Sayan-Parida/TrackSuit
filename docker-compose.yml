version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: tracksuit-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tracksuit_db
      MYSQL_USER: sayan
      MYSQL_PASSWORD: sayan123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: