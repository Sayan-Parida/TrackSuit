# ========================
# SERVER
# ========================
server.port=8080

# ========================
# MYSQL (Docker)
# ========================
spring.datasource.url=jdbc:mysql://localhost:3307/tracksuit_db
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ========================
# GOOGLE OAUTH (Manual Flow)
# ========================
google.oauth2.client-id=${GOOGLE_CLIENT_ID}
google.oauth2.client-secret=${GOOGLE_CLIENT_SECRET}
google.oauth2.redirect-uri=http://localhost:8080/api/v1/gmail/callback
google.oauth2.scope=https://www.googleapis.com/auth/gmail.readonly

# ========================
# LOGGING
# ========================
logging.level.com.tracksuit.backend=DEBUG
logging.level.org.springframework.security=DEBUG